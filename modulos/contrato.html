<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerador de Contrato — LanHouse OS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --border: rgba(0, 0, 0, 0.08);
      --border-focus: rgba(233, 69, 96, 0.35);
      --text-primary: #1a1a2e;
      --text-secondary: #5c5c6e;
      --text-muted: #71717a;
      --accent: #e94560;
      --accent-hover: #d83f5a;
      --btn-export: #e94560;
      --radius: 10px;
      --radius-sm: 6px;
      --shadow-receipt: 0 2px 8px rgba(0,0,0,0.06), 0 8px 32px rgba(0,0,0,0.09);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      font-size: 15px;
      line-height: 1.5;
    }

    .app {
      display: grid;
      grid-template-columns: 360px 1fr;
      grid-template-rows: auto minmax(0, 1fr);
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }

    .app-header {
      grid-column: 1 / -1;
      padding: 20px 32px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      background: var(--bg);
      border: 1px solid var(--border);
      text-decoration: none;
      flex-shrink: 0;
    }

    .btn-back svg { width: 15px; height: 15px; }

    .app-header .logo {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }

    .app-header .logo svg { width: 18px; height: 18px; fill: #fff; }
    .app-header h1 { font-size: 16px; font-weight: 600; }
    .app-header p { font-size: 13px; color: var(--text-muted); margin-left: auto; }

    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 28px 24px;
      overflow-y: auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .sidebar-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .field-group { display: flex; flex-direction: column; gap: 14px; }
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: 12px; font-weight: 500; color: var(--text-secondary); }

    .field input,
    .field textarea,
    .field select {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 14px;
      color: var(--text-primary);
      background: #f8f9fa;
      outline: none;
    }

    .field input:focus,
    .field textarea:focus,
    .field select:focus {
      border-color: var(--border-focus);
      background: var(--surface);
    }

    .field textarea { min-height: 72px; resize: vertical; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .divider { height: 1px; background: var(--border); }
    .field-hint { font-size: 12px; color: var(--text-muted); }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: auto;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 10px 16px;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 13.5px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      width: 100%;
    }

    .btn svg { width: 15px; height: 15px; }
    .btn-primary { background: var(--btn-export); color: #fff; }
    .btn-outline { background: var(--surface); color: var(--text-primary); border: 1px solid var(--border); }

    .preview-area {
      padding: 32px;
      overflow-y: auto;
      min-height: 0;
      display: flex;
      justify-content: center;
    }

    #area-impressao {
      background: #fff;
      color: #000;
      width: 100%;
      max-width: 210mm;
      min-height: 297mm;
      padding: 20mm 22mm;
      box-shadow: var(--shadow-receipt);
      border: 1px solid var(--border);
      font-family: "Times New Roman", Times, serif;
      font-size: 12pt;
      line-height: 1.45;
    }

    .doc-titulo {
      text-align: center;
      font-weight: bold;
      font-size: 14pt;
      margin-bottom: 18pt;
      text-transform: uppercase;
    }

    .doc-secao-titulo {
      font-weight: bold;
      margin-top: 12pt;
      margin-bottom: 6pt;
    }

    .doc-paragrafo {
      text-align: justify;
      margin-bottom: 10pt;
    }

    .doc-lista {
      margin: 0 0 10pt 16pt;
    }

    .doc-lista li { margin-bottom: 4pt; }

    .doc-assinaturas {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32pt;
      margin-top: 36pt;
    }

    .doc-assinatura {
      text-align: center;
    }

    .doc-assinatura .linha {
      border-top: 1px solid #000;
      margin-bottom: 6pt;
      padding-top: 4pt;
    }

    .doc-data-local {
      text-align: center;
      margin-top: 28pt;
      margin-bottom: 8pt;
    }

    @media print {
      html, body { overflow: visible; height: auto; background: #fff; }
      body * { visibility: hidden !important; }
      #area-impressao, #area-impressao * { visibility: visible !important; }
      #area-impressao {
        display: block !important;
        position: absolute;
        left: 0; top: 0;
        width: 210mm;
        min-height: auto;
        margin: 0;
        padding: 18mm 20mm;
        box-shadow: none;
        border: none;
      }
      @page { size: A4; margin: 0; }
    }

    @media (max-width: 860px) {
      html, body { overflow: auto; }
      .app { grid-template-columns: 1fr; height: auto; overflow: visible; }
      .sidebar { border-right: none; border-bottom: 1px solid var(--border); }
      .preview-area { padding: 16px; overflow: visible; }
    }
  </style>
</head>
<body>
<div class="app">
  <header class="app-header no-print">
    <a href="../index.html" class="btn-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      Voltar
    </a>
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6z" fill="#fff"/></svg>
    </div>
    <h1>Gerador de Contrato</h1>
    <p>Contrato de prestação de serviços — imprima ou salve em PDF</p>
  </header>

  <aside class="sidebar no-print">
    <span class="sidebar-title">Contratante (cliente)</span>
    <div class="field-group">
      <div class="field">
        <label for="inp-nome">Nome completo</label>
        <input id="inp-nome" type="text" placeholder="Nome do cliente" />
      </div>
      <div class="field-row">
        <div class="field">
          <label for="inp-cpf">CPF</label>
          <input id="inp-cpf" type="text" placeholder="000.000.000-00" maxlength="14" />
        </div>
        <div class="field">
          <label for="inp-rg">RG</label>
          <input id="inp-rg" type="text" placeholder="Opcional" />
        </div>
      </div>
      <div class="field">
        <label for="inp-endereco">Endereço</label>
        <input id="inp-endereco" type="text" placeholder="Rua, número, bairro" />
      </div>
      <div class="field-row">
        <div class="field">
          <label for="inp-cidade">Cidade / UF</label>
          <input id="inp-cidade" type="text" placeholder="Curitiba - PR" />
        </div>
        <div class="field">
          <label for="inp-telefone">Telefone</label>
          <input id="inp-telefone" type="text" placeholder="(00) 00000-0000" />
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <span class="sidebar-title">Serviço e valores</span>
    <div class="field-group">
      <div class="field">
        <label for="inp-objeto">Objeto do contrato</label>
        <textarea id="inp-objeto" rows="4" placeholder="Descreva o serviço contratado..."></textarea>
      </div>
      <div class="field-row">
        <div class="field">
          <label for="inp-valor">Valor (R$)</label>
          <input id="inp-valor" type="text" placeholder="150,00" inputmode="decimal" />
        </div>
        <div class="field">
          <label for="inp-pagamento">Forma de pagamento</label>
          <input id="inp-pagamento" type="text" placeholder="À vista em dinheiro" />
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label for="inp-inicio">Data de início</label>
          <input id="inp-inicio" type="text" placeholder="16/06/2026" />
        </div>
        <div class="field">
          <label for="inp-prazo">Prazo / término</label>
          <input id="inp-prazo" type="text" placeholder="30 dias ou data específica" />
        </div>
      </div>
      <div class="field">
        <label for="inp-clausulas">Cláusulas adicionais (opcional)</label>
        <textarea id="inp-clausulas" rows="3" placeholder="Texto extra que deseja incluir no contrato..."></textarea>
      </div>
      <div class="field-row">
        <div class="field">
          <label for="inp-cidade-doc">Cidade do documento</label>
          <input id="inp-cidade-doc" type="text" placeholder="Curitiba" />
        </div>
        <div class="field">
          <label for="inp-data-doc">Data</label>
          <input id="inp-data-doc" type="text" placeholder="16 de junho de 2026" />
        </div>
      </div>
      <span class="field-hint">Os dados da Lan House (contratada) vêm de Configurações.</span>
    </div>

    <div class="btn-group">
      <button type="button" class="btn btn-primary" id="btn-imprimir">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Imprimir / Salvar PDF
      </button>
      <button type="button" class="btn btn-outline" id="btn-salvar">Salvar rascunho</button>
      <button type="button" class="btn btn-outline" id="btn-carregar">Carregar rascunho</button>
    </div>
  </aside>

  <main class="preview-area">
    <div id="area-impressao"></div>
  </main>
</div>

<script>
const LanHouseStorage = (() => {
  const KEY_CONFIG = "lanhouse_config";
  const defaults = {
    nomeLanHouse: "Lan House",
    endereco: "",
    telefone: "",
    cpfCnpj: "",
    nomeAtendente: "",
    corTema: "#e94560",
  };
  function safeParseJSON(v) { try { return JSON.parse(v); } catch { return null; } }
  function carregarConfig() {
    const raw = localStorage.getItem(KEY_CONFIG);
    if (!raw) return { ...defaults };
    const p = safeParseJSON(raw);
    return p && typeof p === "object" ? { ...defaults, ...p } : { ...defaults };
  }
  function salvar(chave, dados) {
    try { localStorage.setItem(chave, JSON.stringify(dados)); return true; } catch { return false; }
  }
  function carregar(chave) {
    const raw = localStorage.getItem(chave);
    return raw ? safeParseJSON(raw) : null;
  }
  return { defaults, carregarConfig, salvar, carregar };
})();

const $ = (id) => document.getElementById(id);
const RASCUNHO_KEY = "contrato_rascunho";

function escapeHtml(s) {
  return String(s || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;");
}

function formatDateExtenso(d) {
  const meses = [
    "janeiro", "fevereiro", "março", "abril", "maio", "junho",
    "julho", "agosto", "setembro", "outubro", "novembro", "dezembro",
  ];
  return `${d.getDate()} de ${meses[d.getMonth()]} de ${d.getFullYear()}`;
}

function maskCpf(v) {
  const d = String(v || "").replace(/\D/g, "").slice(0, 11);
  if (d.length <= 3) return d;
  if (d.length <= 6) return `${d.slice(0, 3)}.${d.slice(3)}`;
  if (d.length <= 9) return `${d.slice(0, 3)}.${d.slice(3, 6)}.${d.slice(6)}`;
  return `${d.slice(0, 3)}.${d.slice(3, 6)}.${d.slice(6, 9)}-${d.slice(9)}`;
}

function coletarDados() {
  return {
    nome: $("inp-nome").value.trim(),
    cpf: $("inp-cpf").value.trim(),
    rg: $("inp-rg").value.trim(),
    endereco: $("inp-endereco").value.trim(),
    cidade: $("inp-cidade").value.trim(),
    telefone: $("inp-telefone").value.trim(),
    objeto: $("inp-objeto").value.trim(),
    valor: $("inp-valor").value.trim(),
    pagamento: $("inp-pagamento").value.trim(),
    inicio: $("inp-inicio").value.trim(),
    prazo: $("inp-prazo").value.trim(),
    clausulas: $("inp-clausulas").value.trim(),
    cidadeDoc: $("inp-cidade-doc").value.trim(),
    dataDoc: $("inp-data-doc").value.trim(),
  };
}

function aplicarDados(d) {
  if (!d) return;
  $("inp-nome").value = d.nome || "";
  $("inp-cpf").value = d.cpf || "";
  $("inp-rg").value = d.rg || "";
  $("inp-endereco").value = d.endereco || "";
  $("inp-cidade").value = d.cidade || "";
  $("inp-telefone").value = d.telefone || "";
  $("inp-objeto").value = d.objeto || "";
  $("inp-valor").value = d.valor || "";
  $("inp-pagamento").value = d.pagamento || "";
  $("inp-inicio").value = d.inicio || "";
  $("inp-prazo").value = d.prazo || "";
  $("inp-clausulas").value = d.clausulas || "";
  $("inp-cidade-doc").value = d.cidadeDoc || "";
  $("inp-data-doc").value = d.dataDoc || "";
}

function renderContrato() {
  const d = coletarDados();
  const cfg = LanHouseStorage.carregarConfig();
  const contratada = cfg.nomeLanHouse || "Lan House";
  const docContratada = cfg.cpfCnpj ? `, inscrito(a) no CPF/CNPJ sob nº ${escapeHtml(cfg.cpfCnpj)}` : "";
  const endContratada = cfg.endereco ? `, com endereço em ${escapeHtml(cfg.endereco)}` : "";
  const telContratada = cfg.telefone ? `, telefone ${escapeHtml(cfg.telefone)}` : "";
  const rgPart = d.rg ? `, portador(a) do RG nº ${escapeHtml(d.rg)}` : "";
  const telPart = d.telefone ? `, telefone ${escapeHtml(d.telefone)}` : "";
  const valorFmt = d.valor ? (d.valor.startsWith("R$") ? d.valor : `R$ ${d.valor}`) : "R$ ____________";
  const clausulasExtra = d.clausulas
    ? `<p class="doc-secao-titulo">Cláusulas adicionais:</p><p class="doc-paragrafo">${escapeHtml(d.clausulas).replace(/\n/g, "<br>")}</p>`
    : "";

  $("area-impressao").innerHTML = `
    <div class="doc-titulo">Contrato de Prestação de Serviços</div>

    <p class="doc-paragrafo">
      Pelo presente instrumento particular, as partes abaixo qualificadas resolvem celebrar o presente
      <strong>CONTRATO DE PRESTAÇÃO DE SERVIÇOS</strong>, que se regerá pelas cláusulas e condições a seguir.
    </p>

    <p class="doc-secao-titulo">Das partes:</p>
    <p class="doc-paragrafo">
      <strong>CONTRATANTE:</strong> ${escapeHtml(d.nome) || "________________________"},
      inscrito(a) no CPF sob nº ${escapeHtml(d.cpf) || "___.___.___-__"}${rgPart},
      residente e domiciliado(a) em ${escapeHtml(d.endereco) || "________________________"},
      ${escapeHtml(d.cidade) || "Cidade/UF"}${telPart}.
    </p>
    <p class="doc-paragrafo">
      <strong>CONTRATADA:</strong> ${escapeHtml(contratada)}${docContratada}${endContratada}${telContratada},
      neste ato representada por ${escapeHtml(cfg.nomeAtendente || "seu responsável legal")}.
    </p>

    <p class="doc-secao-titulo">Cláusula 1ª — Do objeto</p>
    <p class="doc-paragrafo">
      O presente contrato tem por objeto a prestação dos seguintes serviços pela CONTRATADA ao(à) CONTRATANTE:
      ${escapeHtml(d.objeto) || "________________________________________________________"}.
    </p>

    <p class="doc-secao-titulo">Cláusula 2ª — Do valor e pagamento</p>
    <p class="doc-paragrafo">
      Pelos serviços descritos, o CONTRATANTE pagará à CONTRATADA o valor total de
      <strong>${escapeHtml(valorFmt)}</strong>,
      da seguinte forma: ${escapeHtml(d.pagamento) || "conforme combinado entre as partes"}.
    </p>

    <p class="doc-secao-titulo">Cláusula 3ª — Do prazo</p>
    <p class="doc-paragrafo">
      O serviço terá início em ${escapeHtml(d.inicio) || "___/___/______"}
      e prazo de execução/término em ${escapeHtml(d.prazo) || "conforme conclusão do serviço"},
      podendo ser prorrogado mediante acordo entre as partes.
    </p>

    <p class="doc-secao-titulo">Cláusula 4ª — Das obrigações</p>
    <ul class="doc-lista">
      <li>A CONTRATADA compromete-se a executar os serviços com zelo, diligência e dentro dos prazos acordados.</li>
      <li>O CONTRATANTE compromete-se a fornecer informações verídicas e materiais necessários à execução do serviço.</li>
      <li>O CONTRATANTE efetuará o pagamento na forma e prazo estabelecidos neste instrumento.</li>
    </ul>

    <p class="doc-secao-titulo">Cláusula 5ª — Disposições gerais</p>
    <ul class="doc-lista">
      <li>Eventuais alterações neste contrato somente terão validade se feitas por escrito e assinadas pelas partes.</li>
      <li>Fica eleito o foro da comarca da sede da CONTRATADA para dirimir quaisquer dúvidas oriundas deste contrato.</li>
      <li>E, por estarem de pleno acordo, assinam o presente em duas vias de igual teor e forma.</li>
    </ul>

    ${clausulasExtra}

    <p class="doc-data-local">
      ${escapeHtml(d.cidadeDoc) || "_______________"}, ${escapeHtml(d.dataDoc) || "___ de __________ de ______"}.
    </p>

    <div class="doc-assinaturas">
      <div class="doc-assinatura">
        <div class="linha">${escapeHtml(d.nome) || "CONTRATANTE"}</div>
        <div>CPF: ${escapeHtml(d.cpf) || "___.___.___-__"}</div>
      </div>
      <div class="doc-assinatura">
        <div class="linha">${escapeHtml(contratada)}</div>
        <div>${escapeHtml(cfg.cpfCnpj ? `CPF/CNPJ: ${cfg.cpfCnpj}` : "CONTRATADA")}</div>
      </div>
    </div>
  `;
}

function bindInputs() {
  const ids = [
    "inp-nome", "inp-cpf", "inp-rg", "inp-endereco", "inp-cidade", "inp-telefone",
    "inp-objeto", "inp-valor", "inp-pagamento", "inp-inicio", "inp-prazo",
    "inp-clausulas", "inp-cidade-doc", "inp-data-doc",
  ];
  ids.forEach((id) => {
    $(id).addEventListener("input", () => {
      if (id === "inp-cpf") $("inp-cpf").value = maskCpf($("inp-cpf").value);
      renderContrato();
    });
  });
}

$("btn-imprimir").addEventListener("click", () => window.print());
$("btn-salvar").addEventListener("click", () => {
  LanHouseStorage.salvar(RASCUNHO_KEY, coletarDados());
});
$("btn-carregar").addEventListener("click", () => {
  aplicarDados(LanHouseStorage.carregar(RASCUNHO_KEY));
  renderContrato();
});

(function init() {
  const cfg = LanHouseStorage.carregarConfig();
  if (cfg.corTema) {
    document.documentElement.style.setProperty("--accent", cfg.corTema);
    document.documentElement.style.setProperty("--btn-export", cfg.corTema);
  }

  const hoje = new Date();
  const pad = (n) => String(n).padStart(2, "0");
  $("inp-inicio").value = `${pad(hoje.getDate())}/${pad(hoje.getMonth() + 1)}/${hoje.getFullYear()}`;
  $("inp-data-doc").value = formatDateExtenso(hoje);
  $("inp-cidade-doc").value = (cfg.endereco || "").split(",").pop()?.trim().split("-")[0]?.trim() || "";
  $("inp-objeto").value = "Prestação de serviços de informática, incluindo impressão, digitalização, acesso à internet e demais serviços disponibilizados na lan house.";
  $("inp-pagamento").value = "À vista no ato da contratação";
  $("inp-prazo").value = "Conforme conclusão do serviço";

  bindInputs();
  renderContrato();
})();
</script>
</body>
</html>
